<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#2a1d18">
  <meta name="description" content="Elis Oliveira Integrativa — terapia, desenvolvimento pessoal, mentoria e terapias integrativas.">
  <title>Elis Oliveira Integrativa</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Inter:ital,wght@0,400;0,500;0,600;1,400;1,500;1,600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css?v=20260701-11">
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.15.0/dist/gsap.min.js" defer></script>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.15.0/dist/ScrollTrigger.min.js" defer></script>
  <script src="script.js?v=20260701-11" defer></script>
</head>
<body>
  <a class="skip-link" href="#conteudo">Pular para o conteúdo</a>

  <main id="conteudo" class="page-shell">
    <section class="hero reveal" aria-labelledby="hero-title">
      <div class="hero__visual">
        <img
          id="hero-image"
          class="hero__portrait"
          src="assets/images/elis-hero.webp"
          alt="Elis Oliveira em retrato profissional"
          width="1672"
          height="941"
          loading="eager"
          fetchpriority="high"
          decoding="async"
        >
      </div>

      <div class="hero__identity">
        <div class="hero__ticker" aria-label="Áreas de atuação">
          <div class="hero__ticker-track" data-role="hero-ticker-track"></div>
        </div>
        <h1 id="hero-title" class="brand">
          <span data-role="first-name">Elis Oliveira</span>
          <em data-role="brand-suffix">Integrativa</em>
        </h1>
        <p class="hero__role" data-role="professional-role">Terapeuta • Mentora • CRTH-BR 9743</p>

        <nav class="socials" aria-label="Redes sociais">
          <a class="social-link" data-social="instagram" href="https://instagram.com/elisoliveiraintegrativa" target="_blank" rel="noopener noreferrer" aria-label="Instagram de Elis Oliveira Integrativa">
            <img src="assets/icons/instagram.svg" alt="" width="19" height="19">
          </a>
        </nav>
      </div>
    </section>

    <section class="tree-story" data-scroll-video-section aria-label="Atendimentos e caminhos de desenvolvimento">
      <div class="tree-story__sticky" aria-hidden="true">
        <video
          id="tree-scroll-video"
          class="tree-story__video"
          muted
          playsinline
          webkit-playsinline
          preload="auto"
          poster="assets/video/tree-scroll-poster.webp"
          tabindex="-1"
          aria-hidden="true"
        ></video>
        <div class="tree-story__veil"></div>
      </div>

      <div class="tree-story__content">
        <section id="services-grid" class="services-grid" aria-label="Atendimentos de Elis Oliveira"></section>
      </div>
    </section>
  </main>
</body>
</html>
